# Tự chạy khi push / PR vào main — kiểm tra cài dependency và import lõi
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r build/requirements.txt

      - name: Config & model class smoke test
        run: |
          python -c "import sys; from pathlib import Path; r=Path('.').resolve(); sys.path.insert(0,str(r)); from config import load_config; load_config(); print('config: OK')"
          python -c "import sys; from pathlib import Path; r=Path('.').resolve(); sys.path.insert(0,str(r)); from src.core.model_handler import HybridModel; import torch; HybridModel(64); print('HybridModel: OK')"

      - name: Preprocessor import (underthesea)
        run: |
          python -c "import sys; from pathlib import Path; r=Path('.').resolve(); sys.path.insert(0,str(r)); from src.core.preprocessor import Preprocessor; Preprocessor().preprocess('thử nghiệm'); print('Preprocessor: OK')"
